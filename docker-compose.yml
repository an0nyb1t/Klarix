# Klarix — Docker Compose
#
# Usage:
#   cp backend/.env.example .env    # Edit with your API keys
#   docker compose up --build
#
# The app will be available at http://localhost:8000

services:
  klarix:
    build: .
    ports:
      - "8000:8000"
    volumes:
      # Persist SQLite, ChromaDB, and cloned repos across restarts
      - klarix-data:/app/data
    env_file:
      - .env
    environment:
      - DATA_DIR=/app/data
      - DATABASE_URL=sqlite+aiosqlite:////app/data/klarix.db
    restart: unless-stopped

volumes:
  klarix-data:
